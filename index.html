<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroBoard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/vars.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/modals.css">
</head>

<body>

  <!-- LOADING -->
  <div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <p>Подключение к Firebase…</p>
  </div>

  <!-- APP -->
  <div class="app" id="appShell" style="display:none">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">
          <svg viewBox="0 0 12 12">
            <rect x="1" y="1" width="4" height="4" rx="1" />
            <rect x="7" y="1" width="4" height="4" rx="1" />
            <rect x="1" y="7" width="4" height="4" rx="1" />
            <rect x="7" y="7" width="4" height="4" rx="1" />
          </svg>
        </div>
        <span class="logo-text">RetroBoard</span>
      </div>
      <div class="sb-label">Доски</div>
      <div class="sb-boards" id="sbBoards"></div>
      <div class="sb-footer">
        <button class="sb-action-btn" onclick="openNewBoardModal()">
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Новая доска
        </button>
        <button class="sb-action-btn" id="copyBoardBtn" onclick="copyBoard()" style="display:none">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="9" y="9" width="13" height="13" rx="2" />
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
          </svg>
          Копировать доску
        </button>
        <button class="sb-action-btn sidebar-toggle" id="sidebarToggleBtn" onclick="toggleSidebar()" title="Свернуть боковую панель">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M8 6l6 6-6 6" />
          </svg>
          <span class="toggle-label">Свернуть</span>
        </button>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
      <div class="topbar">
        <input class="topbar-name" id="topbarName" type="text" value="Выберите доску" spellcheck="false"
          onchange="renameCurBoard(this.value)" onblur="renameCurBoard(this.value)" readonly />
        <div class="topbar-spacer"></div>
        <div class="sync-badge" id="syncBadge">
          <div class="sd"></div><span id="syncText">—</span>
        </div>
        <div class="timer-pill" id="timerPill" onclick="openTimerModal()">
          <div class="t-dot"></div><span id="timerDisplay">5:00</span>
        </div>
        <!-- theme toggle removed -->
      </div>

      <div class="board-canvas" id="boardCanvas">
        <div class="empty-board" id="emptyState">
          <svg fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="18" rx="2" />
            <rect x="14" y="3" width="7" height="12" rx="2" />
          </svg>
          <h3>Нет активной доски</h3>
          <p>Выберите доску слева или создайте новую</p>
        </div>
        <div class="board-inner" id="boardInner" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- ══════════ COLOUR PICKER POPUP (shared, repositioned by JS) ══════════ -->
  <div class="color-popup" id="colorPopup">
    <div class="color-popup-title" id="colorPopupTitle">Цвет</div>
    <div class="color-swatches" id="colorSwatches"></div>
  </div>

  <!-- ══════════ MODALS ══════════ -->

  <!-- New / copy board -->
  <div class="overlay" id="newBoardOverlay">
    <div class="modal">
      <div class="modal-title" id="newBoardModalTitle">Новая доска</div>
      <div class="modal-sub" id="newBoardModalSub">Введите название, например «Sprint #43».</div>
      <div class="mfield">
        <label>Название</label>
        <input type="text" id="newBoardName" placeholder="Sprint #43" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeOverlay('newBoardOverlay')">Отмена</button>
        <button class="btn btn-primary" id="newBoardConfirmBtn" onclick="confirmNewBoard()">Создать</button>
      </div>
    </div>
  </div>

  <!-- Confirm delete board -->
  <div class="overlay" id="delBoardOverlay">
    <div class="modal" style="max-width:340px;text-align:center">
      <div style="font-size:28px;margin-bottom:10px">🗑️</div>
      <div class="modal-title" id="delBoardTitle"></div>
      <div class="modal-sub" id="delBoardMsg"></div>
      <div class="modal-actions" style="justify-content:center">
        <button class="btn btn-ghost" onclick="closeOverlay('delBoardOverlay')">Отмена</button>
        <button class="btn" style="background:#FCEBEB;border-color:#F09595;color:#A32D2D"
          id="delBoardOk">Удалить</button>
      </div>
    </div>
  </div>

  <!-- New column (with colour picker) -->
  <div class="overlay" id="newColOverlay">
    <div class="modal">
      <div class="modal-title">Добавить колонку</div>
      <div class="modal-sub">Задайте название и цветовую схему.</div>
      <div class="mfield">
        <label>Название</label>
        <input type="text" id="newColName" placeholder="Например: Ideas" />
      </div>
      <div class="mfield">
        <label>Цвет заголовка</label>
        <div class="scheme-grid" id="schemeGrid"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeOverlay('newColOverlay')">Отмена</button>
        <button class="btn btn-primary" onclick="confirmNewCol()">Создать</button>
      </div>
    </div>
  </div>

  <!-- Confirm delete column -->
  <div class="overlay" id="delColOverlay">
    <div class="modal" style="max-width:340px;text-align:center">
      <div style="font-size:28px;margin-bottom:10px">🗑️</div>
      <div class="modal-title" id="delColTitle"></div>
      <div class="modal-sub" id="delColMsg"></div>
      <div class="modal-actions" style="justify-content:center">
        <button class="btn btn-ghost" onclick="closeOverlay('delColOverlay')">Отмена</button>
        <button class="btn" style="background:#FCEBEB;border-color:#F09595;color:#A32D2D" id="delColOk">Удалить</button>
      </div>
    </div>
  </div>

  <!-- Timer -->
  <div class="overlay" id="timerOverlay">
    <div class="modal">
      <div class="modal-title">Таймер сессии</div>
      <div class="modal-sub">Установите время на обсуждение.</div>
      <div class="mfield">
        <label>Длительность</label>
        <div class="mrow"><input type="number" id="timerMinInput" value="5" min="1" max="90" /><span>минут</span></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeOverlay('timerOverlay')">Отмена</button>
        <button class="btn btn-primary" id="timerActionBtn" onclick="handleTimerAction()">Запустить</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    /* ═══════════════════════════════════════════════════════════
       ██████  FIREBASE CONFIG — ВСТАВЬТЕ СВОИ КЛЮЧИ СЮДА  ██████
       ═══════════════════════════════════════════════════════════
       Firebase Console → Project Settings → Your apps → Web app
       ══════════════════════════════════════════════════════════ */
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyArRKIb9uRRCHKKmUSI3XDMAkbqBXrSOxs",
      authDomain: "retroboard-b2f7c.firebaseapp.com",
      projectId: "retroboard-b2f7c",
      storageBucket: "retroboard-b2f7c.firebasestorage.app",
      messagingSenderId: "445885996354",
      appId: "1:445885996354:web:49918467ee620d7c5b3cdb",
    };
    /* Firestore Rules:
       rules_version = '2';
       service cloud.firestore {
         match /databases/{database}/documents {
           match /{document=**} { allow read, write: if true; }
         }
       }
    */

    /* ══════════════════════════════════════════════════════════
       COLOUR DEFINITIONS
       ══════════════════════════════════════════════════════════ */

    // Column header colour schemes
    const COL_SCHEMES = [
      { id: 0, name: 'Зелёный', bg: '#EAF3DE', text: '#3B6D11', dot: '#639922', tag: '#C0DD97', tt: '#27500A' },
      { id: 1, name: 'Красный', bg: '#FCEBEB', text: '#A32D2D', dot: '#E24B4A', tag: '#F7C1C1', tt: '#501313' },
      { id: 2, name: 'Синий', bg: '#E6F1FB', text: '#185FA5', dot: '#378ADD', tag: '#B5D4F4', tt: '#042C53' },
      { id: 3, name: 'Оранжевый', bg: '#FAEEDA', text: '#854F0B', dot: '#EF9F27', tag: '#FAC775', tt: '#412402' },
      { id: 4, name: 'Фиолетов.', bg: '#EEEDFE', text: '#534AB7', dot: '#7F77DD', tag: '#CECBF6', tt: '#26215C' },
      { id: 5, name: 'Бирюзовый', bg: '#E1F5EE', text: '#085041', dot: '#1D9E75', tag: '#9FE1CB', tt: '#04342C' },
      { id: 6, name: 'Розовый', bg: '#FDE8F3', text: '#8B1A5A', dot: '#D94F9A', tag: '#F5B8DA', tt: '#4A0D30' },
      { id: 7, name: 'Жёлтый', bg: '#FEFBD8', text: '#6B5E00', dot: '#D4B800', tag: '#F0E070', tt: '#3A3300' },
    ];

    // Card background colour presets (warm palette + neutrals)
    const CARD_COLORS = [
      { hex: '#FFFFFF', label: 'Белый' },
      { hex: '#EFEDE8', label: 'Песочный' },
      { hex: '#FFF8E6', label: 'Кремовый' },
      { hex: '#FEF3DC', label: 'Персик' },
      { hex: '#FDEBD0', label: 'Абрикос' },
      { hex: '#FDE8E8', label: 'Розовый' },
      { hex: '#FDE8F3', label: 'Пудра' },
      { hex: '#E8F4E8', label: 'Мята' },
      { hex: '#E6F1FB', label: 'Лазурь' },
      { hex: '#EDE8FE', label: 'Лаванда' },
      { hex: '#FFFBCC', label: 'Лимон' },
      { hex: '#E8F8F2', label: 'Нефрит' },
    ];

    /* ══════════════════════════════════════════════════════════
       FIREBASE INIT
       ══════════════════════════════════════════════════════════ */
    let db = null, firebaseOk = false, globalTimerUnsub = null;

    function initFirebase() {
      try {
        if (FIREBASE_CONFIG.apiKey === 'PASTE_YOUR_apiKey_HERE') throw new Error('Конфиг не заполнен');
        firebase.initializeApp(FIREBASE_CONFIG);
        db = firebase.firestore();
        db.enablePersistence().catch(() => { });
        firebaseOk = true;
        setSyncBadge('ok', 'Подключено');
      } catch (e) {
        console.warn('Firebase:', e.message);
        setSyncBadge('offline', 'Локально');
      }
    }
    function setSyncBadge(cls, text) {
      document.getElementById('syncBadge').className = 'sync-badge ' + cls;
      document.getElementById('syncText').textContent = text;
    }
    function boardsCol() { return db.collection('retroBoards'); }
    function boardDoc(id) { return boardsCol().doc(id); }
    async function fbSave(b) {
      if (!firebaseOk) return;
      setSyncBadge('syncing', 'Сохранение…');
      try { await boardDoc(b.id).set(b); setSyncBadge('ok', 'Сохранено'); }
      catch (e) { console.error(e); setSyncBadge('offline', 'Ошибка'); }
    }
    async function fbDel(id) { if (firebaseOk) try { await boardDoc(id).delete(); } catch (e) { } }
    let unsub = null;
    function subscribeBoards() {
      if (!firebaseOk) return;
      if (unsub) unsub();
      unsub = boardsCol().onSnapshot(snap => {
        snap.docChanges().forEach(ch => {
          if (ch.type === 'added' || ch.type === 'modified') {
            boards[ch.doc.id] = ch.doc.data();
            if (activeBoardId === ch.doc.id) renderBoard();
          }
          if (ch.type === 'removed') {
            delete boards[ch.doc.id];
            if (activeBoardId === ch.doc.id) { activeBoardId = null; showEmpty(); }
          }
        });
        renderSidebar();
        setSyncBadge('ok', 'В сети');
      }, e => { console.error(e); setSyncBadge('offline', 'Ошибка'); });
    }

    /* ══════════════════════════════════════════════════════════
       LOCAL STORAGE FALLBACK
       ══════════════════════════════════════════════════════════ */
    function lsSave() {
      if (firebaseOk) return;
      try { localStorage.setItem('rb_v4', JSON.stringify({ boards, activeBoardId })); } catch (e) { }
    }
    function lsLoad() {
      try {
        const d = JSON.parse(localStorage.getItem('rb_v4') || 'null');
        if (!d) return false;
        boards = d.boards || {}; activeBoardId = d.activeBoardId || null; return true;
      } catch (e) { return false; }
    }

    /* ══════════════════════════════════════════════════════════
       STATE
       ══════════════════════════════════════════════════════════ */
    const DEFAULT_COLS = [{ id: 'c1', label: 'Start', s: 0 }, { id: 'c2', label: 'Stop', s: 1 }, { id: 'c3', label: 'Continue', s: 2 }];
    const DEFAULT_CARDS = {
      c1: [{ id: 1, text: 'Ежедневные код-ревью по утрам', votes: 3, voted: false, color: null, comments: [] }],
      c2: [{ id: 2, text: 'Затяжные встречи без повестки', votes: 5, voted: false, color: null, comments: [] }],
      c3: [{ id: 3, text: 'Чёткие критерии готовности', votes: 4, voted: false, color: null, comments: [] }],
    };
    let boards = {}, activeBoardId = null;
    const commentOpenState = new Set();
    function curBoard() { return boards[activeBoardId] || null; }
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

    /* ══════════════════════════════════════════════════════════
       BOARDS CRUD
       ══════════════════════════════════════════════════════════ */
    let _newBoardMode = 'create'; // 'create' | 'copy'

    function openNewBoardModal() {
      _newBoardMode = 'create';
      document.getElementById('newBoardModalTitle').textContent = 'Новая доска';
      document.getElementById('newBoardModalSub').textContent = 'Введите название, например «Sprint #43».';
      document.getElementById('newBoardConfirmBtn').textContent = 'Создать';
      document.getElementById('newBoardName').value = '';
      document.getElementById('newBoardOverlay').classList.add('open');
      setTimeout(() => document.getElementById('newBoardName').focus(), 60);
    }
    function copyBoard() {
      const b = curBoard(); if (!b) return;
      _newBoardMode = 'copy';
      document.getElementById('newBoardModalTitle').textContent = 'Копировать доску';
      document.getElementById('newBoardModalSub').textContent = 'Введите название для копии. Все колонки и карточки будут скопированы.';
      document.getElementById('newBoardConfirmBtn').textContent = 'Копировать';
      document.getElementById('newBoardName').value = b.name + ' (копия)';
      document.getElementById('newBoardOverlay').classList.add('open');
      setTimeout(() => { const inp = document.getElementById('newBoardName'); inp.focus(); inp.select(); }, 60);
    }
    function confirmNewBoard() {
      const name = document.getElementById('newBoardName').value.trim() || 'Новая доска';
      if (_newBoardMode === 'copy') { doCopyBoard(name); }
      else { doCreateBoard(name); }
      closeOverlay('newBoardOverlay');
    }
    function doCreateBoard(name) {
      const id = 'b_' + uid();
      const b = {
        id, name, createdAt: Date.now(),
        cols: JSON.parse(JSON.stringify(DEFAULT_COLS)),
        cards: JSON.parse(JSON.stringify(DEFAULT_CARDS)),
        _nextId: 10, _nextColId: 5,
      };
      boards[id] = b; fbSave(b); lsSave(); renderSidebar(); selectBoard(id);
      showToast('Доска «' + name + '» создана');
    }
    function doCopyBoard(name) {
      const src = curBoard(); if (!src) return;
      const id = 'b_' + uid();
      const b = JSON.parse(JSON.stringify(src));
      b.id = id; b.name = name; b.createdAt = Date.now();
      // reset votes on all cards in copy
      Object.values(b.cards).forEach(arr => arr.forEach(c => { c.voted = false; }));
      boards[id] = b; fbSave(b); lsSave(); renderSidebar(); selectBoard(id);
      showToast('Доска скопирована');
    }

    let _pendingDelBoard = null;
    function confirmDelBoard(id) {
      _pendingDelBoard = id;
      const b = boards[id];
      document.getElementById('delBoardTitle').textContent = `Удалить «${b?.name}»?`;
      document.getElementById('delBoardMsg').textContent = 'Все колонки и карточки будут удалены безвозвратно.';
      document.getElementById('delBoardOk').onclick = doDelBoard;
      document.getElementById('delBoardOverlay').classList.add('open');
    }
    function doDelBoard() {
      if (!_pendingDelBoard) return;
      fbDel(_pendingDelBoard); delete boards[_pendingDelBoard];
      if (activeBoardId === _pendingDelBoard) { activeBoardId = null; showEmpty(); }
      _pendingDelBoard = null; closeOverlay('delBoardOverlay'); lsSave(); renderSidebar();
      showToast('Доска удалена');
    }

    function selectBoard(id) {
      if (!boards[id]) return;
      activeBoardId = id;
      const inp = document.getElementById('topbarName');
      inp.value = boards[id].name; inp.removeAttribute('readonly');
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('boardInner').style.display = '';
      document.getElementById('copyBoardBtn').style.display = '';
      renderSidebar(); renderBoard();
    }
    function renameCurBoard(val) {
      const b = curBoard(); if (!b) return;
      b.name = val.trim() || b.name; fbSave(b); lsSave(); renderSidebar();
    }
    function showEmpty() {
      document.getElementById('emptyState').style.display = '';
      document.getElementById('boardInner').style.display = 'none';
      document.getElementById('topbarName').value = 'Выберите доску';
      document.getElementById('topbarName').setAttribute('readonly', '');
      document.getElementById('copyBoardBtn').style.display = 'none';
      renderSidebar();
    }

    function toggleSidebar() {
      const sidebar = document.querySelector('.sidebar');
      if (!sidebar) return;
      const collapsed = sidebar.classList.toggle('collapsed');
      localStorage.setItem('rb_sidebar_collapsed', collapsed ? '1' : '0');
      updateSidebarToggleButton(collapsed);
    }

    function updateSidebarToggleButton(collapsed) {
      const btn = document.getElementById('sidebarToggleBtn');
      if (!btn) return;
      btn.title = collapsed ? 'Развернуть боковую панель' : 'Свернуть боковую панель';
      btn.querySelector('.toggle-label').textContent = collapsed ? 'Развернуть' : 'Свернуть';
      btn.querySelector('svg path').setAttribute('d', collapsed ? 'M8 6l6 6-6 6' : 'M16 6l-6 6 6 6');
    }

    function initSidebarState() {
      const sidebar = document.querySelector('.sidebar');
      if (!sidebar) return;
      const saved = localStorage.getItem('rb_sidebar_collapsed');
      const collapsed = saved === '1';
      if (collapsed) sidebar.classList.add('collapsed');
      updateSidebarToggleButton(collapsed);
    }

    /* Dark theme JS removed; app runs light-only */

    /* ══════════════════════════════════════════════════════════
       SIDEBAR RENDER
       ══════════════════════════════════════════════════════════ */
    function renderSidebar() {
      const el = document.getElementById('sbBoards');
      const list = Object.values(boards).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      if (!list.length) {
        el.innerHTML = '<div style="padding:8px 12px;font-size:12px;color:var(--hint);font-style:italic">Нет досок</div>';
        return;
      }
      el.innerHTML = list.map(b => `
    <div class="board-item ${b.id === activeBoardId ? 'active' : ''}" onclick="selectBoard('${b.id}')">
      <div class="bi-dot"></div>
      <span class="bi-name">${esc(b.name)}</span>
      <div class="bi-actions">
        <button class="bi-icon-btn danger" onclick="event.stopPropagation();confirmDelBoard('${b.id}')" title="Удалить">
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>`).join('');
    }

    /* ══════════════════════════════════════════════════════════
       COLUMNS CRUD
       ══════════════════════════════════════════════════════════ */
    let _newColScheme = 0;

    function openAddCol() {
      _newColScheme = 0;
      document.getElementById('newColName').value = '';
      renderSchemeGrid();
      document.getElementById('newColOverlay').classList.add('open');
      setTimeout(() => document.getElementById('newColName').focus(), 60);
    }
    function renderSchemeGrid() {
      document.getElementById('schemeGrid').innerHTML = COL_SCHEMES.map(s => `
    <div class="scheme-tile ${s.id === _newColScheme ? 'selected' : ''}" onclick="selectScheme(${s.id})"
         style="background:${s.bg}">
      <div class="scheme-dot" style="background:${s.dot}"></div>
      <span class="scheme-name" style="color:${s.text}">${s.name}</span>
    </div>`).join('');
    }
    function selectScheme(id) { _newColScheme = id; renderSchemeGrid(); }
    function confirmNewCol() {
      const b = curBoard(); if (!b) return;
      const label = document.getElementById('newColName').value.trim() || 'Новая колонка';
      const cid = 'c_' + uid();
      b.cols.push({ id: cid, label, s: _newColScheme });
      b.cards[cid] = [];
      fbSave(b); lsSave(); closeOverlay('newColOverlay'); renderBoard();
      setTimeout(() => { const el = document.getElementById('cli-' + cid); if (el) { el.focus(); el.select(); } }, 40);
    }

    function renameCol(colId, val) {
      const b = curBoard(); if (!b) return;
      const c = b.cols.find(x => x.id === colId); if (!c) return;
      c.label = val.trim() || c.label; fbSave(b); lsSave();
    }

    /* Change column colour scheme — triggered by dot click */
    let _colPickerTarget = null; // { type:'col', colId }
    function openColSchemePopup(e, colId) {
      e.stopPropagation();
      _colPickerTarget = { type: 'col', colId };
      const swatches = document.getElementById('colorSwatches');
      document.getElementById('colorPopupTitle').textContent = 'Цвет заголовка';
      const b = curBoard();
      const col = b?.cols.find(c => c.id === colId);
      swatches.innerHTML = COL_SCHEMES.map(s => `
    <div class="swatch ${col?.s === s.id ? 'active' : ''}"
         style="background:${s.bg}; border-color:${col?.s === s.id ? s.dot : 'transparent'}; outline: 2px solid ${s.dot}; outline-offset:1px;"
         title="${s.name}"
         onclick="applyColScheme('${colId}',${s.id})">
    </div>`).join('');
      positionPopup(e);
    }

    function applyColScheme(colId, schemeId) {
      const b = curBoard(); if (!b) return;
      const c = b.cols.find(x => x.id === colId); if (!c) return;
      c.s = schemeId; fbSave(b); lsSave(); closeColorPopup(); renderBoard();
    }

    let _pendingDelCol = null;
    function confirmDelCol(colId) {
      _pendingDelCol = colId;
      const b = curBoard(); const col = b?.cols.find(c => c.id === colId);
      const n = (b?.cards[colId] || []).length;
      document.getElementById('delColTitle').textContent = `Удалить «${col?.label}»?`;
      document.getElementById('delColMsg').textContent = n > 0
        ? `В колонке ${n} карт${n === 1 ? 'очка' : n < 5 ? 'очки' : 'очек'}. Все будут удалены.` : 'Колонка пустая.';
      document.getElementById('delColOk').onclick = doDelCol;
      document.getElementById('delColOverlay').classList.add('open');
    }
    function doDelCol() {
      const b = curBoard(); if (!b || !_pendingDelCol) return;
      b.cols = b.cols.filter(c => c.id !== _pendingDelCol); delete b.cards[_pendingDelCol];
      _pendingDelCol = null; closeOverlay('delColOverlay'); fbSave(b); lsSave(); renderBoard();
      showToast('Колонка удалена');
    }

    /* ══════════════════════════════════════════════════════════
       CARD COLOUR PICKER
       ══════════════════════════════════════════════════════════ */
    let _cardPickerCardId = null;

    function openCardColorPopup(e, cardId) {
      e.stopPropagation();
      _cardPickerCardId = cardId;
      const b = curBoard();
      const col = colOfCard(cardId);
      const card = col ? b.cards[col].find(c => c.id === cardId) : null;
      const curColor = card?.color || null;

      document.getElementById('colorPopupTitle').textContent = 'Цвет карточки';
      const swatches = document.getElementById('colorSwatches');
      // "none" swatch first
      swatches.innerHTML = `
    <div class="swatch none-swatch ${curColor === null ? 'active' : ''}" title="По умолчанию" onclick="applyCardColor(${cardId},null)">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>`+
        CARD_COLORS.map(c => `
      <div class="swatch ${curColor === c.hex ? 'active' : ''}"
           style="background:${c.hex}; border:1.5px solid rgba(0,0,0,.12);"
           title="${c.label}"
           onclick="applyCardColor(${cardId},'${c.hex}')">
      </div>`).join('');
      positionPopup(e);
    }

    function applyCardColor(cardId, color) {
      const b = curBoard(); if (!b) return;
      const col = colOfCard(cardId); if (!col) return;
      const card = b.cards[col].find(c => c.id === cardId); if (!card) return;
      card.color = color;
      fbSave(b); lsSave(); closeColorPopup(); renderBoard();
    }

    /* ══════════════════════════════════════════════════════════
       COLOUR POPUP POSITIONING
       ══════════════════════════════════════════════════════════ */
    function positionPopup(e) {
      const popup = document.getElementById('colorPopup');
      popup.classList.add('open');
      // position near click but keep on screen
      const pw = 220, ph = 120;
      let x = e.clientX + 8, y = e.clientY + 8;
      if (x + pw > window.innerWidth - 8) x = e.clientX - pw - 8;
      if (y + ph > window.innerHeight - 8) y = e.clientY - ph - 8;
      popup.style.left = x + 'px'; popup.style.top = y + 'px';
    }
    function closeColorPopup() {
      document.getElementById('colorPopup').classList.remove('open');
      _colPickerTarget = null; _cardPickerCardId = null;
    }
    document.addEventListener('mousedown', e => {
      const popup = document.getElementById('colorPopup');
      if (popup.classList.contains('open') && !popup.contains(e.target)) closeColorPopup();
    });

    /* ══════════════════════════════════════════════════════════
       CARDS CRUD
       ══════════════════════════════════════════════════════════ */
    function colOfCard(cardId) {
      const b = curBoard(); if (!b) return null;
      for (const k in b.cards) { if (b.cards[k].find(c => c.id === cardId)) return k; }
      return null;
    }
    function openAdd(colId) {
      document.getElementById('at-' + colId).style.display = 'none';
      document.getElementById('af-' + colId).classList.add('open');
      setTimeout(() => document.getElementById('atx-' + colId).focus(), 30);
    }
    function closeAdd(colId) {
      const af = document.getElementById('af-' + colId); if (!af) return;
      af.classList.remove('open');
      document.getElementById('at-' + colId).style.display = '';
      document.getElementById('atx-' + colId).value = '';
    }
    function addCard(colId) {
      const b = curBoard(); if (!b) return;
      const val = document.getElementById('atx-' + colId).value.trim(); if (!val) return;
      b._nextId = (b._nextId || 100) + 1;
      b.cards[colId].push({ id: b._nextId, text: val, votes: 0, voted: false, color: null, comments: [] });
      fbSave(b); lsSave(); renderBoard(); showToast('Карточка добавлена');
    }
    function delCard(cardId) {
      const b = curBoard(); if (!b) return;
      const col = colOfCard(cardId); if (!col) return;
      b.cards[col] = b.cards[col].filter(c => c.id !== cardId);
      fbSave(b); lsSave(); renderBoard();
    }
    function vote(cardId) {
      const b = curBoard(); if (!b) return;
      const col = colOfCard(cardId); if (!col) return;
      const c = b.cards[col].find(c => c.id === cardId); if (!c) return;
      c.voted ? (c.votes--, c.voted = false) : (c.votes++, c.voted = true);
      fbSave(b); lsSave(); renderBoard();
    }

    /* ══════════════════════════════════════════════════════════
       DRAG & DROP
       ══════════════════════════════════════════════════════════ */
    let dnd = { active: false, cardId: null, ghost: null, ox: 0, oy: 0, targetCol: null, insertBefore: null };

    function onCardDown(e, cardId) {
      if (e.target.closest('button, textarea, input, select, .comment-item, .comment-form, .comment-btn')) return;
      e.preventDefault();
      const el = document.getElementById('card-' + cardId);
      const r = el.getBoundingClientRect();
      dnd = { active: true, cardId, ghost: null, ox: e.clientX - r.left, oy: e.clientY - r.top, targetCol: null, insertBefore: null };
      const g = document.createElement('div');
      g.className = 'card-ghost';
      g.style.cssText = `width:${r.width}px;left:${e.clientX - dnd.ox}px;top:${e.clientY - dnd.oy}px`;
      g.textContent = el.querySelector('.card-text').textContent;
      document.body.appendChild(g); dnd.ghost = g;
      el.classList.add('is-dragging');
      document.addEventListener('mousemove', onDragMove, { passive: true });
      document.addEventListener('mouseup', onDragUp);
    }
    function onDragMove(e) {
      if (!dnd.active) return;
      dnd.ghost.style.left = (e.clientX - dnd.ox) + 'px';
      dnd.ghost.style.top = (e.clientY - dnd.oy) + 'px';
      document.querySelectorAll('.drop-ind').forEach(el => el.remove());
      const b = curBoard(); if (!b) return;
      b.cols.forEach(col => document.querySelector(`.column[data-col="${col.id}"]`)?.classList.remove('drag-over'));
      let tc = null;
      for (const col of b.cols) {
        const body = document.getElementById('cb-' + col.id); if (!body) continue;
        const r = body.getBoundingClientRect();
        if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top - 30 && e.clientY <= r.bottom + 30) { tc = col.id; break; }
      }
      dnd.targetCol = tc; if (!tc) return;
      document.querySelector(`.column[data-col="${tc}"]`)?.classList.add('drag-over');
      const body = document.getElementById('cb-' + tc);
      let ib = null;
      for (const c of (b.cards[tc] || [])) {
        if (c.id === dnd.cardId) continue;
        const el = document.getElementById('card-' + c.id); if (!el) continue;
        const r = el.getBoundingClientRect();
        if (e.clientY < r.top + r.height / 2) { ib = c.id; break; }
      }
      dnd.insertBefore = ib;
      const ind = document.createElement('div'); ind.className = 'drop-ind';
      if (ib !== null) { const ref = document.getElementById('card-' + ib); if (ref) body.insertBefore(ind, ref); }
      else body.appendChild(ind);
    }
    function onDragUp() {
      document.removeEventListener('mousemove', onDragMove);
      document.removeEventListener('mouseup', onDragUp);
      document.querySelectorAll('.drop-ind').forEach(el => el.remove());
      const b = curBoard();
      if (b) b.cols.forEach(col => document.querySelector(`.column[data-col="${col.id}"]`)?.classList.remove('drag-over'));
      if (dnd.ghost) { dnd.ghost.remove(); dnd.ghost = null; }
      const cardEl = document.getElementById('card-' + dnd.cardId);
      if (cardEl) cardEl.classList.remove('is-dragging');
      if (dnd.active && dnd.targetCol && b) {
        const { cardId, targetCol, insertBefore } = dnd;
        const fromCol = colOfCard(cardId);
        if (fromCol) {
          const cardObj = b.cards[fromCol].find(c => c.id === cardId);
          b.cards[fromCol] = b.cards[fromCol].filter(c => c.id !== cardId);
          const idx = insertBefore === null ? b.cards[targetCol].length : b.cards[targetCol].findIndex(c => c.id === insertBefore);
          b.cards[targetCol].splice(idx < 0 ? b.cards[targetCol].length : idx, 0, cardObj);
          fbSave(b); lsSave(); renderBoard();
          if (fromCol !== targetCol) showToast('Карточка перемещена');
        }
      }
      dnd = { active: false, cardId: null, ghost: null, ox: 0, oy: 0, targetCol: null, insertBefore: null };
    }

    function schemeVars(s) {

        ${cc.map(c => cardHTML(c)).join('')}

    <rect x="3" y="3" width="18" height="18" rx="3"/>
    <line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
  </svg>Добавить колонку`;
      inner.appendChild(btn);
    }

    function getContrastColor(color) {
      if (!color) return '#1A1916';
      let r, g, b;
      if (color.startsWith('#')) {
        let hex = color.slice(1);
        if (hex.length === 3) {
          hex = hex.split('').map(ch => ch + ch).join('');
        }
        r = parseInt(hex.slice(0, 2), 16);
        g = parseInt(hex.slice(2, 4), 16);
        b = parseInt(hex.slice(4, 6), 16);
      } else if (color.startsWith('rgb')) {
        const nums = color.match(/\d+/g);
        if (!nums) return '#1A1916';
        [r, g, b] = nums.map(Number);
      } else {
        return '#1A1916';
      }
      const luminance = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
      return luminance > 0.65 ? '#1A1916' : '#fff';
    }

    function toggleComments(cardId) {
      if (commentOpenState.has(cardId)) commentOpenState.delete(cardId);
      else commentOpenState.add(cardId);
      renderBoard();
    }

    function saveComment(cardId) {
      const b = curBoard(); if (!b) return;
      const col = colOfCard(cardId); if (!col) return;
      const c = b.cards[col].find(c => c.id === cardId); if (!c) return;
      const input = document.getElementById('comment-input-' + cardId);
      if (!input) return;
      const text = input.value.trim(); if (!text) return;
      c.comments = c.comments || [];
      c.comments.push({ id: 'cm_' + uid(), text, createdAt: Date.now() });
      commentOpenState.add(cardId);
      input.value = '';
      fbSave(b); lsSave(); renderBoard();
    }

        </svg>
        ${commentCount}
      </button>
      <div class="card-spacer"></div>
      <button class="card-color-btn" onclick="openCardColorPopup(event,${c.id})" title="Цвет карточки">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 2a10 10 0 1 0 10 10"/><circle cx="12" cy="12" r="3"/>
          <path d="M12 2v4M12 18v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M2 12h4M18 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>

          <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>
    <div class="comment-section${openClass}" id="comments-${c.id}">
      <div class="comments-list">
        ${count ? comments.map(comment => `
          <div class="comment-item">

      </div>

        <textarea id="comment-input-${c.id}" placeholder="Напишите комментарий" rows="3"></textarea>

    /* ══════════════════════════════════════════════════════════
       ГЛОБАЛЬНЫЙ ТАЙМЕР (синхронизируется через Firebase)
       ══════════════════════════════════════════════════════════ */
    let localTimerSeconds = 300;
    let timerRunning = false;
    let timerInterval = null;

    function timerDocRef() {
      return db.collection('global').doc('timer');
    }

    function computeRemainingSeconds(data) {
      if (!data || !data.running) return data?.durationSec || 300;
      // Если startTimestamp ещё не получен (null) – возвращаем полную длительность, таймер ещё не запущен локально
      if (!data.startTimestamp) return data.durationSec;
      const now = Date.now();
      const startTime = data.startTimestamp.toMillis ? data.startTimestamp.toMillis() : data.startTimestamp;
      const elapsed = (now - startTime) / 1000;
      const remaining = data.durationSec - elapsed;
      return remaining > 0 ? remaining : 0;
    }

    function updateGlobalTimerUI(seconds) {
      const rounded = Math.max(0, Math.floor(seconds)); // округление вниз, чтобы не показывало лишние секунды
      const mins = Math.floor(rounded / 60);
      const secs = String(rounded % 60).padStart(2, '0');
      const display = document.getElementById('timerDisplay');
      if (display) display.textContent = `${mins}:${secs}`;

      const pill = document.getElementById('timerPill');
      if (!pill) return;
      if (rounded <= 0 && timerRunning) {
        pill.className = 'timer-pill expired';
      } else if (timerRunning) {
        pill.className = 'timer-pill running';
      } else {
        pill.className = 'timer-pill';
      }
    }

    function subscribeGlobalTimer() {
      if (!firebaseOk) return;
      if (globalTimerUnsub) globalTimerUnsub();
      globalTimerUnsub = timerDocRef().onSnapshot(doc => {
        const data = doc.exists ? doc.data() : null;
        if (!data || !data.running) {
          // Таймер остановлен или не существует
          if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
          }
          timerRunning = false;
          const seconds = data?.durationSec ?? 300;
          localTimerSeconds = seconds;
          updateGlobalTimerUI(localTimerSeconds);
          return;
        }

        // Таймер запущен
        const remaining = computeRemainingSeconds(data);
        localTimerSeconds = remaining;
        updateGlobalTimerUI(localTimerSeconds);

        // Если время вышло, останавливаем таймер в Firestore
        if (remaining <= 0) {
          if (timerRunning) stopGlobalTimer(); // остановит и очистит интервал
          return;
        }

        // Если таймер ещё не запущен локально, запускаем
        if (!timerRunning) {
          if (timerInterval) clearInterval(timerInterval);
          timerRunning = true;
          timerInterval = setInterval(() => {
            if (!timerRunning) return;
            if (localTimerSeconds > 0) {
              localTimerSeconds = Math.max(0, localTimerSeconds - 1);
              updateGlobalTimerUI(localTimerSeconds);
              if (localTimerSeconds <= 0) {
                stopGlobalTimer();
              }
            }
          }, 1000);
        }
      }, error => {
        console.error('Ошибка подписки таймера:', error);
      });
    }

    async function startGlobalTimer(durationSec) {
      if (!firebaseOk) {
        showToast('Нет соединения с Firebase, таймер не синхронизирован');
        return;
      }
      await timerDocRef().set({
        running: true,
        durationSec: durationSec,
        startTimestamp: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast(`Таймер запущен на ${Math.floor(durationSec / 60)} мин`);
    }

    async function stopGlobalTimer() {
      if (!firebaseOk) return;
      await timerDocRef().set({
        running: false,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      timerRunning = false;
      showToast('Таймер остановлен');
    }

    function openTimerModal() {
      const minutes = Math.max(1, Math.ceil(localTimerSeconds / 60));
      document.getElementById('timerMinInput').value = minutes;
      const actionBtn = document.getElementById('timerActionBtn');
      actionBtn.textContent = timerRunning ? 'Остановить' : 'Запустить';
      document.getElementById('timerOverlay').classList.add('open');
    }

    function handleTimerAction() {
      const minutes = parseInt(document.getElementById('timerMinInput').value) || 5;
      const seconds = minutes * 60;
      if (timerRunning) {
        stopGlobalTimer();
      } else {
        startGlobalTimer(seconds);
      }
      closeOverlay('timerOverlay');
    }

    function initGlobalTimer() {
      if (firebaseOk) {
        subscribeGlobalTimer();
      } else {
        localTimerSeconds = 300;
        timerRunning = false;
        updateGlobalTimerUI(localTimerSeconds);
      }
    }

    /* Export removed */

    /* ══════════════════════════════════════════════════════════
       UTIL
       ══════════════════════════════════════════════════════════ */
    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function closeOverlay(id) { document.getElementById(id)?.classList.remove('open'); }
    function showToast(msg) {
      const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2600);
    }
    document.querySelectorAll('.overlay').forEach(o => {
      o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
    });
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        const b = curBoard(); if (!b) return;
        b.cols.forEach(col => { const f = document.getElementById('af-' + col.id); if (f?.classList.contains('open')) addCard(col.id); });
      }
      if (e.key === 'Escape') {
        document.querySelectorAll('.overlay.open').forEach(o => o.classList.remove('open'));
        closeColorPopup();
        const b = curBoard(); if (b) b.cols.forEach(col => { try { closeAdd(col.id); } catch (e) { } });
      }
    });
    document.getElementById('newBoardName').addEventListener('keydown', e => { if (e.key === 'Enter') confirmNewBoard(); });
    document.getElementById('newColName').addEventListener('keydown', e => { if (e.key === 'Enter') confirmNewCol(); });

    /* ══════════════════════════════════════════════════════════
       BOOT
       ══════════════════════════════════════════════════════════ */
    async function boot() {
      initFirebase();
      if (firebaseOk) {
        try { const snap = await boardsCol().get(); snap.forEach(d => { boards[d.id] = d.data(); }); } catch (e) { console.error(e); }
        subscribeBoards();
      } else {
        lsLoad();
      }
      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('appShell').style.display = '';
      initGlobalTimer(); initSidebarState(); renderSidebar();
      const first = Object.values(boards).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))[0];
      if (first) selectBoard(first.id);
    }
    boot();
  </script>
</body>

</html>
